# Rate limit zones — included by nginx.conf (http context)
# Thresholds per security.md rule 14.
#
# Zone memory sizing: 1 MB stores ~16,000 IP state entries.
# All zones key on $binary_remote_addr (4 bytes IPv4 / 16 bytes IPv6).
#
# Application of limits:
#   login zone   → POST /api/v1/auth/login   (5 req/min per IP)
#   refresh zone → POST /api/v1/auth/refresh (30 req/min per IP)
#   api zone     → all other /api/ routes    (200 req/min per IP)

limit_req_zone $binary_remote_addr zone=login:1m   rate=5r/m;
limit_req_zone $binary_remote_addr zone=refresh:1m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api:4m     rate=200r/m;

# Log at warn level when rate limit is hit; avoids flooding error log
limit_req_log_level warn;
