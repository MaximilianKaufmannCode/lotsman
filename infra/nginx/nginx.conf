user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # JSON access log format — captured by Promtail
    log_format json_combined escape=json
        '{'
          '"ts":"$time_iso8601",'
          '"remote_addr":"$remote_addr",'
          '"method":"$request_method",'
          '"uri":"$request_uri",'
          '"status":$status,'
          '"body_bytes_sent":$body_bytes_sent,'
          '"request_time":$request_time,'
          '"upstream_response_time":"$upstream_response_time",'
          '"http_referer":"$http_referer",'
          '"http_user_agent":"$http_user_agent",'
          '"request_id":"$request_id"'
        '}';

    access_log  /var/log/nginx/access.log  json_combined;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;

    # Hide Nginx version in headers and error pages
    server_tokens off;

    # Gzip for text content
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
    gzip_comp_level 4;
    gzip_vary on;

    # Per-zone rate limits (thresholds per security.md rule 14)
    # Defined here so they are available across all server blocks
    include /etc/nginx/conf.d/rate-limits.conf;

    include /etc/nginx/conf.d/*.conf;
}
