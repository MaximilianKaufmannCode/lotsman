# Security headers — included by lotsman.conf
# Implements security.md rule 7 (HSTS, X-Frame-Options, nosniff,
# no-referrer, baseline CSP).
#
# CSP notes:
#   - default-src 'self' blocks all off-origin loads by default.
#   - script-src 'self' — no unsafe-inline (React build is bundled, no inline scripts).
#   - style-src 'self' 'unsafe-inline' — Tailwind injects inline styles at runtime;
#     revisit with nonce-based CSP when the frontend is stable.
#   - img-src 'self' data: — avatars / favicon may be data URIs.
#   - connect-src 'self' — XHR/fetch to same origin only.
#   - frame-ancestors 'none' — belt-and-suspenders alongside X-Frame-Options.
#   - form-action 'self' — prevents form hijacking.
#   - base-uri 'self' — blocks base tag injection.
#
# Permissions-Policy: deny access to sensitive browser APIs not used by the app.

add_header Strict-Transport-Security     "max-age=63072000; includeSubDomains; preload" always;
add_header X-Frame-Options               "DENY" always;
add_header X-Content-Type-Options        "nosniff" always;
add_header Referrer-Policy               "no-referrer" always;
add_header X-XSS-Protection             "0" always;  # Disabled — modern browsers use CSP instead
add_header Content-Security-Policy
    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self';"
    always;
add_header Permissions-Policy
    "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
    always;
