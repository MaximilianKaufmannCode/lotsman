# Loki configuration — single-binary, filesystem storage (on-prem default)
# Designed for the Лоцман single-host deployment.
# For production with higher ingestion, consider upgrading to microservices mode
# or using an object store (MinIO) — document as an ADR when needed.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn
  log_format: json

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory:  /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Retention: 30 days (adjust in production based on storage capacity)
limits_config:
  retention_period: 720h        # 30 days
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16
  max_streams_per_user: 10000
  max_label_name_length: 1024
  max_label_value_length: 4096
  max_entries_limit_per_query: 5000

# Compactor manages retention enforcement
compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  retention_delete_delay: 2h
  compaction_interval: 10m

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules

analytics:
  reporting_enabled: false
