[importlinter]
root_packages =
    auth_service
    registry_service
    notification_service
    audit_service
    web_bff
    lotsman_shared
include_external_packages = True

# ---------------------------------------------------------------------------
# Contract 1: Clean architecture — domain layer has no outward imports
# ---------------------------------------------------------------------------
[importlinter:contract:auth-domain-isolation]
name = auth-service domain must not import application, infrastructure, or api
type = forbidden
source_modules =
    auth_service.domain
forbidden_modules =
    auth_service.application
    auth_service.infrastructure
    auth_service.api

[importlinter:contract:registry-domain-isolation]
name = registry-service domain must not import application, infrastructure, or api
type = forbidden
source_modules =
    registry_service.domain
forbidden_modules =
    registry_service.application
    registry_service.infrastructure
    registry_service.api

[importlinter:contract:notification-domain-isolation]
name = notification-service domain must not import application, infrastructure, or api
type = forbidden
source_modules =
    notification_service.domain
forbidden_modules =
    notification_service.application
    notification_service.infrastructure
    notification_service.api

[importlinter:contract:audit-domain-isolation]
name = audit-service domain must not import application, infrastructure, or api
type = forbidden
source_modules =
    audit_service.domain
forbidden_modules =
    audit_service.application
    audit_service.infrastructure
    audit_service.api

# ---------------------------------------------------------------------------
# Contract 2: Clean architecture — application layer cannot import infrastructure or api
# ---------------------------------------------------------------------------
[importlinter:contract:auth-application-isolation]
name = auth-service application must not import infrastructure or api
type = forbidden
source_modules =
    auth_service.application
forbidden_modules =
    auth_service.infrastructure
    auth_service.api

[importlinter:contract:registry-application-isolation]
name = registry-service application must not import infrastructure or api
type = forbidden
source_modules =
    registry_service.application
forbidden_modules =
    registry_service.infrastructure
    registry_service.api

[importlinter:contract:notification-application-isolation]
name = notification-service application must not import infrastructure or api
type = forbidden
source_modules =
    notification_service.application
forbidden_modules =
    notification_service.infrastructure
    notification_service.api

[importlinter:contract:audit-application-isolation]
name = audit-service application must not import infrastructure or api
type = forbidden
source_modules =
    audit_service.application
forbidden_modules =
    audit_service.infrastructure
    audit_service.api

# ---------------------------------------------------------------------------
# Contract 3: Clean architecture — infrastructure cannot import api
# ---------------------------------------------------------------------------
[importlinter:contract:auth-infrastructure-isolation]
name = auth-service infrastructure must not import api
type = forbidden
source_modules =
    auth_service.infrastructure
forbidden_modules =
    auth_service.api

[importlinter:contract:registry-infrastructure-isolation]
name = registry-service infrastructure must not import api
type = forbidden
source_modules =
    registry_service.infrastructure
forbidden_modules =
    registry_service.api

[importlinter:contract:notification-infrastructure-isolation]
name = notification-service infrastructure must not import api
type = forbidden
source_modules =
    notification_service.infrastructure
forbidden_modules =
    notification_service.api

[importlinter:contract:audit-infrastructure-isolation]
name = audit-service infrastructure must not import api
type = forbidden
source_modules =
    audit_service.infrastructure
forbidden_modules =
    audit_service.api

# ---------------------------------------------------------------------------
# Contract 4: Cross-service import isolation — services must not import each other
# ---------------------------------------------------------------------------
[importlinter:contract:auth-no-cross-service]
name = auth-service must not import other services
type = forbidden
source_modules =
    auth_service
forbidden_modules =
    registry_service
    notification_service
    audit_service
    web_bff

[importlinter:contract:registry-no-cross-service]
name = registry-service must not import other services
type = forbidden
source_modules =
