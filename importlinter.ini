forbidden_modules =
    auth_service
    notification_service
    audit_service
    web_bff

[importlinter:contract:notification-no-cross-service]
name = notification-service must not import other services
type = forbidden
source_modules =
    notification_service
forbidden_modules =
    auth_service
    registry_service
    audit_service
    web_bff

[importlinter:contract:audit-no-cross-service]
name = audit-service must not import other services
type = forbidden
source_modules =
    audit_service
forbidden_modules =
    auth_service
    registry_service
    notification_service
    web_bff
