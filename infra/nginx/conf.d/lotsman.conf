# Лоцман — main virtual host
# Per ADR-0002 acceptance #1: web-bff is the ONLY upstream; no backend service
# is directly exposed through Nginx. The BFF fans out via internal JWTs.

upstream web_bff {
    server web-bff:8000;
    keepalive 32;
}

# ── HTTPS server ──────────────────────────────────────────────────────────────

server {
    listen      443 ssl;
    http2       on;
    server_name lotsman.example.com;

    ssl_certificate     /etc/nginx/certs/lotsman.crt;
    ssl_certificate_key /etc/nginx/certs/lotsman.key;

    # Protocol and cipher hardening
    ssl_protocols           TLSv1.3 TLSv1.2;
    ssl_prefer_server_ciphers on;
    ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache       shared:SSL:10m;
    ssl_session_timeout     1d;
    ssl_session_tickets     off;
    ssl_stapling            on;
    ssl_stapling_verify     on;

    # Security headers (pulled from shared include)
    include /etc/nginx/conf.d/security-headers.conf;

    # Upload limit for document attachments (≤25 MiB per security rule 10)
    client_max_body_size 30M;

    # Propagate a unique request ID through every proxied request
    # Enables end-to-end tracing via logs + Loki
    add_header X-Request-ID $request_id always;

    # ── Auth endpoints — strict rate limiting ──────────────────────────────
    location /api/v1/auth/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://web_bff;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
    }

    location /api/v1/auth/refresh {
        limit_req zone=refresh burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://web_bff;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
    }

    # ── General API ────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=40 nodelay;
        limit_req_status 429;

        proxy_pass         http://web_bff;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;

        # Reasonable timeouts: BFF fans out to multiple services
        proxy_connect_timeout  5s;
        proxy_send_timeout     30s;
        proxy_read_timeout     60s;
    }

    # ── Health probe (no rate limit, no auth) ─────────────────────────────
    location /healthz {
        proxy_pass         http://web_bff;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log off;
    }

    # ── SPA shell + static assets ─────────────────────────────────────────
    # web-bff serves the React SPA bundle and SSR shell
    location / {
        proxy_pass         http://web_bff;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
    }
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────

server {
    listen      80;
    server_name lotsman.example.com;
    # Redirect to the configured server_name, NOT the client-supplied $host,
    # to avoid Host-header / open-redirect injection on the HTTP listener.
    return 301  https://$server_name$request_uri;
}
