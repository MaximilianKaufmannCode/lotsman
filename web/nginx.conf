server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers (server-level defaults).
    # NOTE: nginx `add_header` inside a location REPLACES all inherited add_header
    # directives — so any location that sets its own add_header (e.g. Cache-Control)
    # MUST repeat these, or the security headers are silently dropped for it.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets — long cache
    location /assets/ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "public, immutable" always;
        expires 1y;
        try_files $uri =404;
    }

    # SPA fallback — all unmatched routes serve index.html
    location / {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint — no add_header, so it inherits the server-level
    # security headers above (nginx only replaces them when a location sets its own).
    location /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
